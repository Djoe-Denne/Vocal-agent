[hotkey]
toggle = "<ctrl>+<alt>+<space>"
attach_clipboard_image = "<ctrl>+<alt>+i"
unload_model = "<ctrl>+<alt>+u"

[audio]
# Use %TEMP% for Windows temp directory, or specify a full path
tmp_dir = "%TEMP%"
rate = 16000
channels = 1

[asr]
# Backend: "whisper" (OpenAI) or "huggingface" (transformers-based models like Qwen)
backend = "huggingface"
# Save transcription to shared folder (set to false to skip)
save_transcription = false

# =============================================================================
# Whisper Backend Settings (used when backend = "whisper")
# =============================================================================
[asr.whisper]
# Model size: tiny, base, small, medium, large, large-v2, large-v3
model = "large"
language = "fr"
# Set to true to force FP32 (for CPU), false enables FP16 on GPU (faster)
force_fp32 = false
# Initial prompt to guide transcription style (helps with formatting)
initial_prompt = "Transcription claire et professionnelle, sans hésitations ni onomatopées."
# Suppress filler sounds like "hmm", "uh", "euh" (may slightly affect accuracy)
suppress_fillers = true

# =============================================================================
# HuggingFace Backend Settings (used when backend = "huggingface")
# =============================================================================
[asr.huggingface]
# Model from Hugging Face Hub
model = "Qwen/Qwen3-ASR-1.7B"
language = "fr"
# Torch dtype: "float16", "bfloat16", or "float32"
torch_dtype = "float16"
# Use device_map="auto" for automatic GPU placement
device_map_auto = true

[streaming]
# Duration of each audio chunk in seconds
chunk_duration = 5.0
# Overlap with previous chunk to avoid cutting words
overlap_duration = 1.0

[reconciler]
# Algorithm for merging overlapping transcription segments
# Options: "none" (disable reconciliation), "word_overlap" (fast, default), "fuzzy" (handles typos), "llm" (best accuracy)
algorithm = "none"

# Word overlap settings (for algorithm = "word_overlap")
min_overlap_words = 3
max_context_words = 15

# Fuzzy matching settings (for algorithm = "fuzzy")
# Requires: pip install rapidfuzz
fuzzy_threshold = 0.8

# LLM settings (for algorithm = "llm")
# Requires: pip install transformers
# Models: "HuggingFaceTB/SmolLM2-360M-Instruct" (fast), "HuggingFaceTB/SmolLM2-1.7B-Instruct" (better)
llm_model = "HuggingFaceTB/SmolLM2-1.7B-Instruct"
llm_device = "cuda"
# Clean up hesitations (uh, um, euh), stutters, and filler words
llm_cleanup_hesitations = true

[beep]
start_stop = true
every_seconds = 30
# Windows beep settings (frequency in Hz, duration in milliseconds)
frequency = 800
duration_ms = 200

[clipboard]
# Saved as <shared_dir>/<prefix><timestamp>.png
prefix = "whisper_ptt_clip_"
# Delete the saved image after sending to agent
delete_after_send = true

[openclaw]
send = true
# Podman container name running OpenClaw
container_name = "openclaw-agent"
session_id = "agent:main:main"
single_line = false
max_chars = 8000
# Shared folder for transcriptions and attachments (accessible by container at /app/shared)
shared_dir = "./shared"

[daemon]
# API endpoint for uploading audio and receiving transcription
api_url = "http://127.0.0.1:8000/v1/audio/transcriptions"
# Request timeout in seconds
api_timeout = 60
# JSON key where transcription text is found (if response is JSON)
api_response_key = "text"
# Multipart form field name for audio file
api_file_field = "file"
# Optional fields sent to the API
api_model = ""
api_language = ""
# Additional headers (e.g., Authorization)
api_headers = {}
# Additional form fields sent with the request
api_extra_fields = {}
# Delete temporary audio file after successful send
delete_audio_after_send = true

[api]
# PTT HTTP transcription API (byte stream)
host = "127.0.0.1"
port = 8002
log_level = "info"
preload_model = false
